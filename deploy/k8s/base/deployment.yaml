apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibevoice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vibevoice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vibevoice
    spec:
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: vibevoice
          image: registry.144.91.77.245.sslip.io/vibevoice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: vibevoice-site-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi
